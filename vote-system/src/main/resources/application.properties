spring.application.name=vote-system
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/vote_system
spring.datasource.username=postgres
spring.datasource.password=onlyK
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
server.error.include-message=always
server.error.include-stacktrace=always

app.admin.token=${ADMIN_TOKEN:change-me}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Enable HTTP response compression (gzip/brotli negotiated by container)
server.compression.enabled=true
# Common MIME types to compress (add/remove as needed)
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml
# Only compress responses larger than this
server.compression.min-response-size=1024
